name: Release Client

on:
  push:
    tags:
      - 'v*'  # 触发条件：推送 v 开头的 tag，如 v0.2.0

env:
  NODE_VERSION: '20'

jobs:
  build-windows:
    name: Build Windows Client
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: client/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: npm ci
        working-directory: client

      - name: Get version from tag
        id: version
        shell: bash
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"

      - name: Sync client version files
        run: node scripts/sync-client-version.mjs "${{ steps.version.outputs.VERSION }}"

      - name: Show synced versions
        shell: pwsh
        run: |
          Write-Host "tauri.conf.json version:"
          (Get-Content client/src-tauri/tauri.conf.json -Raw | ConvertFrom-Json).version
          Write-Host "Cargo.toml package version:"
          (Select-String -Path client/src-tauri/Cargo.toml -Pattern '^version = ".*"$' | Select-Object -First 1).Line
          Write-Host "package.json version:"
          (Get-Content client/package.json -Raw | ConvertFrom-Json).version

      - name: Build Tauri app
        run: npm run tauri build
        working-directory: client
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          VITE_API_BASE: https://ksxvodevhonx.sealosbja.site/api/v1

      - name: List bundle outputs
        shell: pwsh
        run: |
          Get-ChildItem -Recurse -Force client/src-tauri/target/release/bundle

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-artifacts
          path: client/src-tauri/target/release/bundle/**
          if-no-files-found: error

  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest
    needs: build-windows

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: windows-artifacts
          path: artifacts

      - name: List downloaded artifacts
        run: |
          echo "=== Artifacts directory structure ==="
          find artifacts -type f | head -50
          echo "=== Looking for EXE files ==="
          find artifacts -name "*.exe" -type f
          echo "=== Looking for SIG files ==="
          find artifacts -name "*.sig" -type f

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Prepare updater metadata
        env:
          VERSION: ${{ steps.version.outputs.VERSION }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          DEFAULT_NOTES="修复若干已知问题，优化使用体验并提升稳定性。"
          NOTES_FILE="client/release-notes/${VERSION}.txt"
          PUB_DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          NOTES_FROM_FILE=""
          if [ -f "$NOTES_FILE" ]; then
            NOTES_FROM_FILE="$(cat "$NOTES_FILE")"
          fi

          TAG_NOTES="$(git for-each-ref "refs/tags/${TAG_NAME}" --format='%(contents)')"
          if [ -z "$TAG_NOTES" ] && [ -z "$NOTES_FROM_FILE" ]; then
            TAG_NOTES="$DEFAULT_NOTES"
          fi

          export VERSION PUB_DATE NOTES_FROM_FILE TAG_NOTES
          python3 - <<'PY'
          import json
          import os

          version = os.environ["VERSION"]
          pub_date = os.environ["PUB_DATE"]
          notes = (os.environ.get("NOTES_FROM_FILE") or "").strip()
          if not notes:
              notes = (os.environ.get("TAG_NOTES") or "").strip()

          notes = notes.replace("\r\n", "\n").replace("\r", "\n")

          data = {
              "latest_version": version,
              "notes": notes,
              "pub_date": pub_date,
          }

          with open("latest.json", "w", encoding="utf-8") as f:
              json.dump(data, f, ensure_ascii=False)
          PY

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add server to known_hosts
        run: ssh-keyscan -H -p 2233 ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts

      - name: Upload to server
        shell: bash
        run: |
          set -euo pipefail

          VERSION="${{ steps.version.outputs.VERSION }}"
          REMOTE_BASE="${{ secrets.RELEASE_PATH }}"
          REMOTE_DIR="$REMOTE_BASE/$VERSION"

          # 查找构建产物
          EXE_PATH=$(find artifacts -type f -path "*/nsis/*" -name "RPBox_*_x64-setup.exe" | head -n1)
          [ -z "$EXE_PATH" ] && EXE_PATH=$(find artifacts -type f -name "RPBox_*_x64-setup.exe" | head -n1)
          [ -z "$EXE_PATH" ] && { echo "ERROR: setup exe not found"; exit 1; }
          SIG_PATH="${EXE_PATH}.sig"
          [ ! -f "$SIG_PATH" ] && { echo "ERROR: signature not found"; exit 1; }

          SSH_HOST="${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}"
          SSH_OPTS=(-p 2233 -o ServerAliveInterval=30 -o ServerAliveCountMax=10 -o TCPKeepAlive=yes -o ConnectTimeout=30)
          SCP_OPTS=(-P 2233 -o ServerAliveInterval=30 -o ServerAliveCountMax=10 -o TCPKeepAlive=yes -o ConnectTimeout=30)

          upload_with_retry() {
            local src="$1"
            local dest="$2"
            local attempt
            for attempt in 1 2 3; do
              if scp "${SCP_OPTS[@]}" "$src" "${SSH_HOST}:$dest"; then
                return 0
              fi

              if [ "$attempt" -lt 3 ]; then
                echo "Upload failed for $src (attempt $attempt), retrying..."
                sleep $((attempt * 15))
              fi
            done

            echo "ERROR: failed to upload $src after 3 attempts"
            return 1
          }

          ssh "${SSH_OPTS[@]}" "$SSH_HOST" "mkdir -p '$REMOTE_DIR' '$REMOTE_BASE'"

          REMOTE_EXE_FINAL="$REMOTE_DIR/$(basename "$EXE_PATH")"
          REMOTE_EXE_TMP="$REMOTE_EXE_FINAL.part"
          REMOTE_SIG_FINAL="$REMOTE_DIR/$(basename "$SIG_PATH")"
          REMOTE_SIG_TMP="$REMOTE_SIG_FINAL.part"
          REMOTE_META_VER_FINAL="$REMOTE_DIR/latest.json"
          REMOTE_META_VER_TMP="$REMOTE_META_VER_FINAL.part"
          REMOTE_META_LATEST_FINAL="$REMOTE_BASE/latest.json"
          REMOTE_META_LATEST_TMP="$REMOTE_META_LATEST_FINAL.part"

          upload_with_retry "$EXE_PATH" "$REMOTE_EXE_TMP"
          ssh "${SSH_OPTS[@]}" "$SSH_HOST" "mv -f '$REMOTE_EXE_TMP' '$REMOTE_EXE_FINAL'"

          upload_with_retry "$SIG_PATH" "$REMOTE_SIG_TMP"
          ssh "${SSH_OPTS[@]}" "$SSH_HOST" "mv -f '$REMOTE_SIG_TMP' '$REMOTE_SIG_FINAL'"

          upload_with_retry latest.json "$REMOTE_META_VER_TMP"
          ssh "${SSH_OPTS[@]}" "$SSH_HOST" "mv -f '$REMOTE_META_VER_TMP' '$REMOTE_META_VER_FINAL'"

          upload_with_retry latest.json "$REMOTE_META_LATEST_TMP"
          ssh "${SSH_OPTS[@]}" "$SSH_HOST" "mv -f '$REMOTE_META_LATEST_TMP' '$REMOTE_META_LATEST_FINAL'"

  update-pages:
    name: Update GitHub Pages
    runs-on: ubuntu-latest
    needs: deploy
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Update fallback version in download.html
        run: |
          VERSION=${{ steps.version.outputs.VERSION }}
          sed -i "s/var fallbackVersion = '.*'/var fallbackVersion = '${VERSION}'/" shared/download.html
          echo "Updated fallbackVersion to ${VERSION}"
          grep fallbackVersion shared/download.html

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add shared/download.html
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "chore: update download page fallback version to v${{ steps.version.outputs.VERSION }}"
          git push origin main

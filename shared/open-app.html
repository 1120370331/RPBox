<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>打开 RPBox</title>
    <style>
        :root {
            color-scheme: light;
            --bg: #f4ede4;
            --panel: rgba(255, 255, 255, 0.9);
            --text: #3e2d22;
            --muted: #7d6858;
            --accent: #8f5631;
            --accent-strong: #734326;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
            color: var(--text);
            background:
                radial-gradient(circle at top, rgba(143, 86, 49, 0.18), transparent 32%),
                linear-gradient(180deg, #f7f0e7 0%, var(--bg) 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }

        .panel {
            width: min(480px, 100%);
            padding: 28px;
            border-radius: 24px;
            background: var(--panel);
            box-shadow: 0 24px 60px rgba(62, 45, 34, 0.14);
            border: 1px solid rgba(143, 86, 49, 0.12);
        }

        h1 {
            margin: 0 0 12px;
            font-size: 28px;
        }

        p {
            margin: 0;
            line-height: 1.7;
            color: var(--muted);
        }

        .actions {
            display: grid;
            gap: 12px;
            margin-top: 24px;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-height: 48px;
            padding: 0 18px;
            border-radius: 999px;
            font-size: 15px;
            font-weight: 600;
            text-decoration: none;
            border: 1px solid rgba(143, 86, 49, 0.18);
        }

        .btn-primary {
            background: var(--accent);
            color: #fff;
            border-color: transparent;
        }

        .btn-primary:hover {
            background: var(--accent-strong);
        }

        .btn-secondary {
            color: var(--text);
            background: rgba(143, 86, 49, 0.06);
        }

        .tip {
            margin-top: 18px;
            font-size: 13px;
            color: var(--muted);
        }

        .browser-guide {
            position: fixed;
            inset: 0;
            display: none;
            background: rgba(24, 18, 14, 0.72);
            z-index: 20;
            pointer-events: none;
        }

        .browser-guide.active {
            display: block;
        }

        .browser-guide__arrow {
            position: absolute;
            top: 14px;
            right: 26px;
            width: 96px;
            height: 96px;
            border-top: 4px solid #fff;
            border-right: 4px solid #fff;
            border-radius: 0 20px 0 0;
            transform: rotate(14deg);
            opacity: 0.98;
        }

        .browser-guide__arrow::after {
            content: "";
            position: absolute;
            top: -9px;
            right: -6px;
            width: 18px;
            height: 18px;
            border-top: 4px solid #fff;
            border-right: 4px solid #fff;
            transform: rotate(12deg);
        }

        .browser-guide__card {
            position: absolute;
            top: 92px;
            right: 18px;
            max-width: min(280px, calc(100vw - 32px));
            padding: 14px 16px;
            border-radius: 18px;
            background: rgba(255, 255, 255, 0.96);
            color: var(--text);
            font-size: 15px;
            line-height: 1.65;
            box-shadow: 0 18px 36px rgba(0, 0, 0, 0.16);
        }
    </style>
</head>
<body>
    <aside id="browser-guide" class="browser-guide" aria-hidden="true">
        <div class="browser-guide__arrow"></div>
        <div class="browser-guide__card">请点击右上角菜单，选择“在浏览器中打开链接”，再返回打开 RPBox。</div>
    </aside>

    <main class="panel">
        <h1>正在尝试打开 RPBox</h1>
        <p id="status">如果你的设备已经安装 RPBox，将自动跳转到应用内；如果未安装，请点击下载。</p>
        <div class="actions">
            <a id="open-app-btn" class="btn btn-primary" href="./download.html">立即打开 App</a>
            <a id="download-btn" class="btn btn-secondary" href="./download.html">下载 RPBox</a>
        </div>
        <p id="tip" class="tip">如果微信、QQ 内置浏览器拦截了跳转，请点击“立即打开 App”。</p>
    </main>

    <script>
        (function () {
            var params = new URLSearchParams(window.location.search);
            var rawPath = params.get('path') || '';
            var normalized = '';
            var currentOrigin = window.location.origin || 'https://totalrpbox.com';
            var downloadUrl = currentOrigin + '/download.html';
            var MANUAL_STATUS_DELAY = 2600;
            var MOBILE_APP_SCHEME = 'app.rpbox.mobile';
            var MOBILE_APP_PACKAGE = 'app.rpbox.mobile';
            var DESKTOP_APP_SCHEME = 'rpbox';
            var status = document.getElementById('status');
            var openBtn = document.getElementById('open-app-btn');
            var downloadBtn = document.getElementById('download-btn');
            var browserGuide = document.getElementById('browser-guide');
            var tip = document.getElementById('tip');

            function normalizePath(input) {
                if (!input) return '';
                try {
                    input = decodeURIComponent(input);
                } catch (err) {
                    return '';
                }
                if (input.charAt(0) !== '/') {
                    input = '/' + input.replace(/^\/+/, '');
                }
                input = input.replace(/\/{2,}/g, '/').replace(/\/+$/, '');
                if (!input) return '';
                var allowed = [
                    /^\/posts\/\d+$/,
                    /^\/items\/\d+$/,
                    /^\/stories\/\d+$/,
                    /^\/profiles\/\d+$/,
                    /^\/guild\/\d+$/,
                    /^\/guild\/\d+\/posts$/,
                    /^\/guild\/\d+\/stories$/,
                ];
                for (var i = 0; i < allowed.length; i += 1) {
                    if (allowed[i].test(input)) return input;
                }
                return '';
            }

            function isAndroidDevice() {
                return /Android/i.test(window.navigator.userAgent || '');
            }

            function isMobileDevice() {
                return /Android|iPhone|iPad|iPod|Mobile/i.test(window.navigator.userAgent || '');
            }

            function isEmbeddedSocialBrowser() {
                var ua = window.navigator.userAgent || '';
                if (/MicroMessenger/i.test(ua)) return true;
                if (/V1_AND_SQ_/i.test(ua)) return true;
                if (/QQ\//i.test(ua) && !/QQBrowser|MQQBrowser/i.test(ua)) return true;
                return false;
            }

            function buildSchemeUrl(path) {
                return MOBILE_APP_SCHEME + '://open?path=' + encodeURIComponent(path);
            }

            function buildAndroidIntentUrl(path) {
                return 'intent://open?path=' + encodeURIComponent(path)
                    + '#Intent;scheme=' + MOBILE_APP_SCHEME
                    + ';package=' + MOBILE_APP_PACKAGE
                    + ';S.browser_fallback_url=' + encodeURIComponent(downloadUrl)
                    + ';end';
            }

            function buildDesktopSchemeUrl(path) {
                return DESKTOP_APP_SCHEME + '://open?path=' + encodeURIComponent(path);
            }

            function getPreferredOpenUrl(path) {
                if (!isMobileDevice()) {
                    return buildDesktopSchemeUrl(path);
                }
                if (isAndroidDevice()) {
                    return buildAndroidIntentUrl(path);
                }
                return buildSchemeUrl(path);
            }

            function showBrowserGuide() {
                if (!browserGuide) return;
                browserGuide.classList.add('active');
                browserGuide.setAttribute('aria-hidden', 'false');
                status.textContent = '当前是微信/QQ 内置浏览器，请点击右上角菜单，选择“在浏览器中打开链接”。';
            }

            normalized = normalizePath(rawPath);
            if (!normalized) {
                window.location.replace(downloadUrl);
                return;
            }

            if (!isMobileDevice()) {
                status.textContent = '如果你的电脑已经安装 RPBox 桌面客户端，将自动跳转到应用内；如果未安装，请下载桌面版。';
                openBtn.textContent = '立即打开桌面客户端';
                downloadBtn.textContent = '下载桌面版';
                if (tip) {
                    tip.textContent = '如果浏览器拦截了跳转，请点击“立即打开桌面客户端”。';
                }
            }

            if (isEmbeddedSocialBrowser()) {
                showBrowserGuide();
                downloadBtn.href = downloadUrl;
                return;
            }

            var preferredOpenUrl = getPreferredOpenUrl(normalized);
            openBtn.href = preferredOpenUrl;

            var appOpened = false;
            var manualHintTimer = 0;

            downloadBtn.href = downloadUrl;

            function clearManualHintTimer() {
                if (!manualHintTimer) return;
                window.clearTimeout(manualHintTimer);
                manualHintTimer = 0;
            }

            function markAppOpened() {
                appOpened = true;
                clearManualHintTimer();
            }

            function attemptOpenApp() {
                openBtn.href = preferredOpenUrl;
                try {
                    window.location.href = preferredOpenUrl;
                } catch (err) {
                    return false;
                }
                return true;
            }

            function showManualFallbackHint() {
                clearManualHintTimer();
                manualHintTimer = window.setTimeout(function () {
                    if (appOpened) return;
                    status.textContent = '如果没有自动打开 RPBox，请点击“立即打开 App”；若仍无反应，再点击“下载 RPBox”。';
                }, MANUAL_STATUS_DELAY);
            }

            document.addEventListener('visibilitychange', function () {
                if (document.hidden) {
                    markAppOpened();
                }
            });

            window.addEventListener('pagehide', markAppOpened);
            window.addEventListener('blur', function () {
                // 部分移动浏览器在切到原生 App 时只触发 blur，不会立即 hidden。
                if (document.hidden) {
                    markAppOpened();
                    return;
                }
                window.setTimeout(function () {
                    if (document.hidden) {
                        markAppOpened();
                    }
                }, 120);
            });

            openBtn.addEventListener('click', function (event) {
                event.preventDefault();
                clearManualHintTimer();
                status.textContent = '正在再次尝试打开 RPBox...';
                if (!attemptOpenApp()) {
                    status.textContent = '未能打开 RPBox，请点击“下载 RPBox”。';
                    return;
                }
                showManualFallbackHint();
            });

            if (!attemptOpenApp()) {
                showManualFallbackHint();
                return;
            }
            showManualFallbackHint();
        })();
    </script>
</body>
</html>
